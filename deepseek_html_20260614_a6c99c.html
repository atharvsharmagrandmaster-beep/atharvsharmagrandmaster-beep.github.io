<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Advanced Calculator | Free Online Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 20px;
            position: relative;
        }

        /* Background animation */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .calculator-container {
            width: 100%;
            max-width: 400px;
            z-index: 1;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .calculator:hover {
            transform: translateY(-5px);
        }

        /* Display Screen */
        .display-section {
            margin-bottom: 25px;
        }

        .previous-operand {
            background: #f1f3f5;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 1.2rem;
            color: #6c757d;
            min-height: 55px;
            word-wrap: break-word;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .current-display {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 5px 20px;
        }

        .current-display input {
            width: 100%;
            height: 85px;
            font-size: 2.8rem;
            text-align: right;
            background: transparent;
            border: none;
            color: #212529;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            outline: none;
            padding: 0;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            background: white;
            padding: 18px 0;
            border-radius: 20px;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #212529;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 100px;
            height: 100px;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Number buttons */
        .number {
            background: #ffffff;
            color: #212529;
        }

        .number:hover {
            background: #f8f9fa;
        }

        /* Operator buttons */
        .operator {
            background: #ffd43b;
            color: #212529;
            font-size: 1.8rem;
        }

        .operator:hover {
            background: #fcc419;
        }

        /* Special buttons */
        .clear {
            background: #ff6b6b;
            color: white;
        }

        .clear:hover {
            background: #fa5252;
        }

        .equals {
            background: #51cf66;
            color: white;
            font-size: 1.8rem;
        }

        .equals:hover {
            background: #40c057;
        }

        .delete {
            background: #868e96;
            color: white;
            font-size: 1.4rem;
        }

        .delete:hover {
            background: #495057;
        }

        /* Zero button spans 2 columns */
        .zero {
            grid-column: span 2;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .calculator {
                padding: 20px;
            }

            .current-display input {
                height: 70px;
                font-size: 2.2rem;
            }

            .previous-operand {
                font-size: 1rem;
                min-height: 45px;
            }

            button {
                padding: 15px 0;
                font-size: 1.4rem;
            }

            .operator, .equals {
                font-size: 1.6rem;
            }

            .buttons {
                gap: 10px;
            }
        }

        @media (max-width: 360px) {
            .calculator {
                padding: 15px;
            }

            button {
                padding: 12px 0;
                font-size: 1.2rem;
            }

            .current-display input {
                height: 60px;
                font-size: 1.8rem;
            }
        }

        /* Landscape mode */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .calculator {
                max-width: 600px;
                padding: 15px;
            }

            .current-display input {
                height: 50px;
                font-size: 1.6rem;
            }

            button {
                padding: 8px 0;
                font-size: 1.2rem;
            }

            .buttons {
                gap: 8px;
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        /* Animation for result */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        .result-animation {
            animation: pulse 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator">
            <div class="display-section">
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-display">
                    <input type="text" id="display" value="0" readonly>
                </div>
            </div>
            
            <div class="buttons">
                <button class="clear" onclick="clearAll()">AC</button>
                <button class="delete" onclick="deleteLast()">⌫</button>
                <button class="operator" onclick="appendOperator('/')">÷</button>
                <button class="operator" onclick="appendOperator('*')">×</button>
                
                <button class="number" onclick="appendNumber('7')">7</button>
                <button class="number" onclick="appendNumber('8')">8</button>
                <button class="number" onclick="appendNumber('9')">9</button>
                <button class="operator" onclick="appendOperator('-')">−</button>
                
                <button class="number" onclick="appendNumber('4')">4</button>
                <button class="number" onclick="appendNumber('5')">5</button>
                <button class="number" onclick="appendNumber('6')">6</button>
                <button class="operator" onclick="appendOperator('+')">+</button>
                
                <button class="number" onclick="appendNumber('1')">1</button>
                <button class="number" onclick="appendNumber('2')">2</button>
                <button class="number" onclick="appendNumber('3')">3</button>
                <button class="equals" onclick="calculate()">=</button>
                
                <button class="number zero" onclick="appendNumber('0')">0</button>
                <button class="number" onclick="appendNumber('.')">.</button>
            </div>
        </div>
        <div class="footer">
            <p>Made with ❤️ | Free Online Calculator</p>
        </div>
    </div>

    <script>
        // DOM elements
        const display = document.getElementById('display');
        const previousOperand = document.getElementById('previousOperand');
        
        let currentInput = '0';
        let previousInput = '';
        let operation = null;
        let shouldResetDisplay = false;

        // Update the display
        function updateDisplay() {
            display.value = currentInput;
            if (operation && previousInput) {
                previousOperand.textContent = `${previousInput} ${getOperatorSymbol(operation)}`;
            } else if (previousInput) {
                previousOperand.textContent = previousInput;
            } else {
                previousOperand.textContent = '';
            }
        }

        // Get operator symbol
        function getOperatorSymbol(op) {
            const symbols = {
                '+': '+',
                '-': '−',
                '*': '×',
                '/': '÷'
            };
            return symbols[op] || op;
        }

        // Append number
        function appendNumber(number) {
            if (shouldResetDisplay) {
                currentInput = '';
                shouldResetDisplay = false;
            }
            
            if (number === '.') {
                if (currentInput.includes('.')) return;
                if (currentInput === '') {
                    currentInput = '0.';
                } else {
                    currentInput += '.';
                }
            } else {
                if (currentInput === '0' && number !== '.') {
                    currentInput = number;
                } else {
                    currentInput += number;
                }
            }
            
            updateDisplay();
        }

        // Append operator
        function appendOperator(op) {
            if (operation !== null && !shouldResetDisplay) {
                calculate();
            }
            
            previousInput = currentInput;
            operation = op;
            shouldResetDisplay = true;
            updateDisplay();
        }

        // Calculate result
        function calculate() {
            if (operation === null || shouldResetDisplay) return;
            if (previousInput === '') return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            if (isNaN(prev) || isNaN(current)) return;
            
            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        showError("Cannot divide by zero!");
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }
            
            // Format the result
            if (Number.isInteger(result)) {
                currentInput = result.toString();
            } else {
                // Limit to 10 decimal places
                currentInput = parseFloat(result.toFixed(10)).toString();
            }
            
            previousInput = '';
            operation = null;
            shouldResetDisplay = true;
            
            // Add animation
            display.classList.add('result-animation');
            setTimeout(() => {
                display.classList.remove('result-animation');
            }, 300);
            
            updateDisplay();
        }

        // Clear everything
        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operation = null;
            shouldResetDisplay = false;
            updateDisplay();
        }

        // Delete last character
        function deleteLast() {
            if (shouldResetDisplay) return;
            
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        // Show error message
        function showError(message) {
            currentInput = 'Error';
            updateDisplay();
            setTimeout(() => {
                clearAll();
            }, 1500);
        }

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            
            // Numbers
            if (/[0-9]/.test(key)) {
                event.preventDefault();
                appendNumber(key);
            }
            
            // Decimal point
            if (key === '.') {
                event.preventDefault();
                appendNumber('.');
            }
            
            // Operators
            if (key === '+') {
                event.preventDefault();
                appendOperator('+');
            }
            if (key === '-') {
                event.preventDefault();
                appendOperator('-');
            }
            if (key === '*') {
                event.preventDefault();
                appendOperator('*');
            }
            if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            }
            
            // Calculate
            if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            }
            
            // Clear
            if (key === 'Escape') {
                event.preventDefault();
                clearAll();
            }
            
            // Backspace
            if (key === 'Backspace') {
                event.preventDefault();
                deleteLast();
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
